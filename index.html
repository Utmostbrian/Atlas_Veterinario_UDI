<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content Security Policy — mitiga XSS (S-07).
      - default-src 'self': solo recursos del mismo origen por defecto.
      - script-src 'self' 'unsafe-inline': necesario para Vite en dev; eliminar unsafe-inline en producción con nonces.
      - connect-src: permite llamadas a la API de Anthropic y Google Fonts.
      - font-src / style-src: Google Fonts y cdnjs para Font Awesome.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
      font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:;
      img-src 'self' data: blob:;
      connect-src 'self' https://srqvesvyvylbrtxbztdx.supabase.co;
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self';
    " />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Atlas Farmacológico Veterinario — UDI</title>
    <meta name="description" content="Atlas Farmacológico Veterinario con IA · Facultad de Veterinaria UDI" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Atlas Vet UDI" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
