name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

  secrets-scan:
    # B-04: previene re-introducción de credenciales en el repo.
    # Si alguien commitea un sk-ant-... o una contraseña conocida, CI falla.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for leaked secrets
        run: |
          set -e
          PATTERN='sk-ant-api[0-9]{2}-[A-Za-z0-9_-]{40,}|VERCEL_OIDC_TOKEN=|STUDENT_ACCOUNT_PASSWORD=|STUDENT_CLASS_CODE=|AtlasVet2026|EstudianteVet2026'
          if git grep -nIE "$PATTERN" -- ':(exclude).github/workflows/*' ':(exclude).env.example' ; then
            echo "::error::Secretos detectados en el repo. Revisa los matches arriba."
            exit 1
          fi
          echo "OK — sin secretos detectados."

  migrations-lint:
    # B-04: valida que las migraciones SQL existan y no tengan BOM/UTF artefactos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate migrations
        run: |
          set -e
          for f in supabase/migrations/*.sql; do
            if [ ! -s "$f" ]; then
              echo "::error file=$f::Migración vacía"
              exit 1
            fi
            if head -c 3 "$f" | grep -q $'\xef\xbb\xbf'; then
              echo "::error file=$f::BOM detectado al inicio del archivo"
              exit 1
            fi
          done
          echo "OK — todas las migraciones pasan validación básica."
